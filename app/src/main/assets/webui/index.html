<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Termux Agent Multilingual</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; overflow: hidden; }
    
    /* Dynamic Direction Support */
    .rtl { direction: rtl; text-align: right; }
    .ltr { direction: ltr; text-align: left; }

    /* Sidebar - History List */
    .sidebar { width: 260px; background: #1e293b; border-inline-end: 1px solid #334155; display: flex; flex-direction: column; height: 100%; transition: all 0.3s ease; z-index: 100; }
    .sidebar.hidden { margin-inline-start: -260px; }
    .sidebar-header { padding: 15px; border-bottom: 1px solid #334155; font-weight: bold; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
    .history-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .history-item { padding: 10px; background: #0f172a; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid #334155; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-item:hover { background: #2563eb; color: white; }

    /* Main Chat Layout */
    .main-chat { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
    .header { background: #1e293b; padding: 15px; text-align: center; border-bottom: 1px solid #334155; font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: space-between; padding-inline: 20px; }
    .status-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; margin-inline-end: 5px; }
    .menu-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }

    /* Message Bubbles */
    .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .message { max-width: 80%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 15px; word-break: break-word; }
    .msg-user { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-agent { background: #1e293b; color: #e2e8f0; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #334155; }
    
    /* Terminal Execution Block */
    .cmd-block { background: #020617; color: #38bdf8; font-family: monospace; padding: 8px 12px; border-radius: 6px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; direction: ltr; text-align: left; }
    .run-btn { background: #0ea5e9; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
    .run-btn:hover { background: #0284c7; }

    /* Input Container (+ Button) */
    .input-wrapper { padding: 15px; background: #0f172a; display: flex; justify-content: center; }
    .input-container { background: #1e293b; border: 1px solid #334155; border-radius: 24px; width: 100%; max-width: 600px; padding: 8px 14px; display: flex; flex-direction: column; gap: 8px; }
    
    .input-row { display: flex; align-items: center; width: 100%; }
    .input-cursor { width: 2px; height: 20px; background: #10b981; display: inline-block; margin-inline-end: 5px; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    input { flex: 1; padding: 8px; background: transparent; color: white; border: none; font-size: 16px; outline: none; }
    
    .controls-row { display: flex; justify-content: space-between; align-items: center; width: 100%; border-top: 1px solid #334155; padding-top: 8px; }
    .add-btn { background: #e2e8f0; color: #0f172a; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .send-btn { background: #2563eb; color: white; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

  <!-- Sidebar (History Panel) -->
  <div class="sidebar hidden" id="sidebar">
    <div class="sidebar-header ltr">
      <span id="sideTitle">Chat History</span>
      <button class="menu-btn" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-item ltr" onclick="loadHistory('apt update', 'en')">🕒 Update Packages (apt)</div>
      <div class="history-item rtl" onclick="loadHistory('عرض ملفات النظام', 'ar')">🕒 استعراض ملفات النظام</div>
    </div>
  </div>

  <!-- Main Chat Interface -->
  <div class="main-chat">
    <div class="header ltr">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div>
        <span class="status-dot"></span>
        <span id="navTitle">AI Termux Agent</span>
      </div>
      <div style="width:24px;"></div>
    </div>

    <div class="chat-container" id="chat">
      <div class="message msg-agent rtl" id="welcomeMsg">
        مرحباً بك! أنا الوكيل المساعد الخاص بك. كيف يمكنني مساعدتك اليوم؟<br><small style="color:#94a3b8">Type in English or Arabic...</small>
      </div>
    </div>

    <!-- Input Bar -->
    <div class="input-wrapper">
      <div class="input-container">
        <div class="input-row">
          <div class="input-cursor"></div>
          <input type="text" id="userInput" placeholder="Ask anything / اسأل عن أي شيء..." onkeydown="if(event.key==='Enter') handleSend()">
        </div>
        <div class="controls-row">
          <button class="add-btn" onclick="alert('Attach file / custom action')">+</button>
          <button class="send-btn" onclick="handleSend()">➔</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const userInput = document.getElementById('userInput');
    const sidebar = document.getElementById('sidebar');

    function toggleSidebar() {
      sidebar.classList.toggle('hidden');
    }

    // Detection helper for Arabic text
    function isArabic(text) {
      const arabicPattern = /[\u0600-\u06FF]/;
      return arabicPattern.test(text);
    }

    function appendMessage(text, sender, langClass, hasCommand = false, cmdText = "") {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender} ${langClass}`;
      msgDiv.innerText = text;

      if (hasCommand) {
        const cmdDiv = document.createElement('div');
        cmdDiv.className = 'cmd-block';
        cmdDiv.innerHTML = `<span>$ ${cmdText}</span><button class="run-btn" onclick="executeTermux('${cmdText}')">Run</button>`;
        msgDiv.appendChild(cmdDiv);
      }

      chat.appendChild(msgDiv);
      chat.scrollTop = chat.scrollHeight;
    }

    function handleSend() {
      const text = userInput.value.trim();
      if (!text) return;

      const langClass = isArabic(text) ? 'rtl' : 'ltr';
      appendMessage(text, 'msg-user', langClass);
      userInput.value = '';

      // UI Text dynamic language updater based on last active usage
      updateUiLabels(langClass === 'rtl' ? 'ar' : 'en');

      setTimeout(() => {
        let reply = "";
        let hasCmd = false;
        let cmd = "";

        if (langClass === 'rtl') {
          // Arabic Logic responses
          if (text.includes('تحديث')) { reply = "أمر تحديث المستودعات وحزم النظام:"; hasCmd = true; cmd = "apt update && apt upgrade -y"; }
          else if (text.includes('ملفات')) { reply = "أمر عرض الملفات بصيغة تفصيلية:"; hasCmd = true; cmd = "ls -la"; }
          else { reply = "فهمت طلبك، هل تود تشغيل هذا الأمر الخلفي؟"; }
        } else {
          // English Logic responses
          if (text.includes('update') || text.includes('upgrade')) { reply = "Here is the command to update your system repositories:"; hasCmd = true; cmd = "apt update && apt upgrade -y"; }
          else if (text.includes('file') || text.includes('ls')) { reply = "Here is the command to list files in detail:"; hasCmd = true; cmd = "ls -la"; }
          else { reply = "I understood your request. Would you like to execute this in Termux?"; }
        }
        
        appendMessage(reply, 'msg-agent', langClass, hasCmd, cmd);
      }, 800);
    }

    function updateUiLabels(lang) {
      if (lang === 'ar') {
        document.getElementById('sideTitle').innerText = "المحادثات السابقة";
        document.getElementById('navTitle').innerText = "وكيل Termux الذكي";
        document.getElementById('userInput').placeholder = "اسأل عن أي شيء...";
      } else {
        document.getElementById('sideTitle').innerText = "Chat History";
        document.getElementById('navTitle').innerText = "AI Termux Agent";
        document.getElementById('userInput').placeholder = "Ask anything...";
      }
    }

    function loadHistory(title, lang) {
      const langClass = (lang === 'ar') ? 'rtl' : 'ltr';
      updateUiLabels(lang);
      appendMessage(lang === 'ar' ? `إعادة فتح: ${title}` : `Reloaded: ${title}`, 'msg-agent', langClass);
      toggleSidebar();
    }

    function executeTermux(cmd) {
      if (window.TermuxBridge) {
        window.TermuxBridge.exec(cmd);
      } else {
        alert("Command sent to Termux backend: " + cmd);
      }
    }
  </script>
</body>
</html>
