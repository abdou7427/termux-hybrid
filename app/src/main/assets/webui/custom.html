<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧪 Custom Lab</title>
  <style>
    :root { --bg-color: #0d1117; --chat-bg: #161b22; --text-primary: #e6edf3; --text-secondary: #8b949e; --accent: #f0883e; --border: #30363d; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-primary); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .toolbar { background: var(--chat-bg); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 10px; }
    .toolbar-title { flex: 1; color: var(--accent); font-size: 14px; font-weight: bold; }
    .toolbar-btn { background: #21262d; border: 1px solid var(--border); color: var(--text-primary); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .workspace { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
    .workspace-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
    .workspace h2 { color: var(--text-primary); margin-bottom: 10px; }
    .workspace p { color: var(--text-secondary); font-size: 13px; max-width: 300px; line-height: 1.6; margin-bottom: 20px; }
    .workspace code { background: var(--chat-bg); padding: 4px 8px; border-radius: 4px; color: var(--accent); font-size: 12px; }
    .status-bar { background: var(--chat-bg); border-top: 1px solid var(--border); padding: 5px 16px; font-size: 11px; color: var(--text-secondary); display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">🧪 Automation Sandbox</span>
    <button class="toolbar-btn" onclick="location.reload()">🔄 Reload</button>
  </div>
  <div class="workspace">
    <div class="workspace-icon">🧪</div>
    <h2>Custom Lab</h2>
    <p>This is a secure sandbox for agent automation tasks.<br><br>You can edit this interface directly via Termux:<br><code>nano ~/webui/custom.html</code></p>
  </div>
  <div class="status-bar">
    <span>Ready</span>
    <span>Sandboxed Environment</span>
  </div>
  <script>
    // This environment is isolated. No TermuxBridge is injected.
    // Write your automation DOM manipulation here safely.
  </script>
</body>
</html>
