<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>POCKET AGENT</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117; --chat-bg: #161b22; --user-msg: #1f6feb;
            --ai-msg: #21262d; --text-primary: #e6edf3; --text-secondary: #8b949e;
            --accent: #58a6ff; --border: #30363d; --code-bg: #0d1117;
            --success: #3fb950; --danger: #f85149; --warn: #d29922;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .header { padding: 10px 15px; background: var(--chat-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 18px; background: linear-gradient(90deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .agent-controls { display: flex; align-items: center; gap: 6px; background: var(--bg-color); padding: 4px 8px; border-radius: 20px; border: 1px solid var(--border); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); transition: all 0.3s; }
        .status-dot.online { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .ctrl-btn { background: none; border: none; color: var(--text-secondary); font-size: 16px; cursor: pointer; padding: 4px; border-radius: 6px; transition: all .15s; }
        .ctrl-btn:hover { color: var(--accent); background: rgba(88,166,255,0.1); }

        .chat-container { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; position: relative; }
        .message { margin-bottom: 18px; max-width: 88%; position: relative; animation: fadeIn 0.3s ease; }
        .message.user { margin-left: auto; }
        .message.user .bubble { background: var(--user-msg); border-radius: 15px 15px 0 15px; padding: 10px 15px; }
        .message.ai { margin-right: auto; width: 88%; }
        .message.ai .bubble { background: var(--ai-msg); border-radius: 15px 15px 15px 0; padding: 12px 15px; border: 1px solid var(--border); min-height: 20px; }
        .message.system { margin: 0 auto; background: transparent; color: var(--text-secondary); text-align: center; font-size: 12px; font-style: italic; margin-bottom: 20px; }

        .msg-meta { font-size: 10px; color: var(--text-secondary); margin-bottom: 4px; padding: 0 4px; }

        .bubble p { margin-bottom: 8px; line-height: 1.7; }
        .bubble a { color: var(--accent); text-decoration: underline; cursor: pointer; }

        /* مؤشر آلة الطباعة أثناء توليد الرد */
        .typing-cursor { display: inline-block; width: 2px; height: 14px; background: var(--accent); margin-inline-start: 2px; vertical-align: middle; animation: blinkCursor 0.8s steps(1) infinite; }
        @keyframes blinkCursor { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

        /* قسم التفاصيل/خطوات التفكير القابل للطي */
        .thinking-details { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: rgba(255,255,255,0.02); }
        .thinking-details[hidden] { display: none; }
        .thinking-details summary { cursor: pointer; padding: 8px 10px; font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; list-style: none; user-select: none; }
        .thinking-details summary::-webkit-details-marker { display: none; }
        .thinking-details summary::before { content: "▶"; font-size: 9px; transition: transform .2s; }
        .thinking-details[open] summary::before { transform: rotate(90deg); }
        .thinking-details .steps-body { padding: 4px 10px 10px 10px; font-size: 12px; color: var(--text-secondary); border-top: 1px solid var(--border); max-height: 200px; overflow-y: auto; font-family: 'Courier New', monospace; }
        .thinking-details .step-line { padding: 3px 0; border-bottom: 1px dashed rgba(255,255,255,0.05); white-space: pre-wrap; word-break: break-word; }
        .thinking-details .step-line:last-child { border-bottom: none; }

        .code-block-wrapper { position: relative; margin: 10px 0; background: var(--code-bg); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .code-header { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; background: #161b22; font-size: 12px; color: var(--text-secondary); }
        .code-actions button { background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: 2px 8px; border-radius: 4px; cursor: pointer; margin-left: 5px; font-size: 11px; }
        .code-actions button:hover { background: var(--border); color: white; }
        .code-block-wrapper pre { margin: 0; padding: 10px; overflow-x: auto; }
        .code-block-wrapper code { font-family: 'Courier New', monospace; font-size: 13px; }

        .msg-toolbar { display: flex; align-items: center; gap: 4px; margin-top: 4px; padding: 0 2px; opacity: 0.85; }
        .msg-toolbar button {
            background: none; border: none; color: var(--text-secondary); cursor: pointer;
            width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; transition: all .15s;
        }
        .msg-toolbar button:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }
        .msg-toolbar button svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; }
        .msg-toolbar button.active-like { color: var(--success); }
        .msg-toolbar button.active-dislike { color: var(--danger); }
        .msg-toolbar button.active-translate { color: var(--accent); }
        .msg-toolbar .spacer { flex: 1; }

        .input-area { padding: 12px 15px; background: var(--chat-bg); border-top: 1px solid var(--border); display: flex; align-items: flex-end; gap: 10px; }
        .attach-btn, .send-btn { background: none; border: none; color: var(--text-secondary); font-size: 22px; cursor: pointer; flex-shrink: 0; padding-bottom: 4px; }
        .attach-btn:hover, .send-btn:hover:not(:disabled) { color: var(--accent); }
        .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        #user-input { flex: 1; background: var(--bg-color); border: 1px solid var(--border); border-radius: 18px; padding: 10px 15px; color: white; outline: none; font-size: 14px; resize: none; max-height: 120px; min-height: 40px; line-height: 1.4; }
        #user-input:focus { border-color: var(--accent); }

        .typing { display: none; align-items: center; gap: 6px; color: var(--text-secondary); font-style: italic; padding: 6px 4px; font-size: 13px; }
        .typing.visible { display: flex; }
        .typing .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-secondary); animation: blink 1.2s infinite ease-in-out; }
        .typing .dot:nth-child(2) { animation-delay: .2s; }
        .typing .dot:nth-child(3) { animation-delay: .4s; }

        .scroll-bottom-btn { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); background: var(--chat-bg); border: 1px solid var(--border); color: var(--text-primary); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.4); z-index: 5; }
        .scroll-bottom-btn.visible { display: flex; }

        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: #2d333b; color: var(--text-primary); padding: 8px 16px; border-radius: 20px; font-size: 12px; opacity: 0; pointer-events: none; transition: all .25s; z-index: 200; border: 1px solid var(--border); }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); text-align: center; gap: 8px; }
        .empty-state .icon { font-size: 40px; margin-bottom: 6px; opacity: .7; }
        .empty-state h3 { color: var(--text-primary); font-weight: 600; font-size: 15px; }
        .empty-state p { font-size: 12px; max-width: 240px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90; display: none; }
        .overlay.visible { display: block; }
        .history-panel { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: var(--chat-bg); border-left: 1px solid var(--border); z-index: 100; transition: right 0.3s ease; display: flex; flex-direction: column; }
        .history-panel.open { right: 0; }
        .history-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .history-header h3 { color: var(--text-primary); font-size: 16px; }
        .history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; color: var(--text-primary); font-size: 13px; border: 1px solid transparent; }
        .history-item:hover { background: var(--ai-msg); border-color: var(--border); }
        .history-item .title { font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item .date { color: var(--text-secondary); font-size: 11px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 80%, 100% { opacity: .3; } 40% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleHistory()"></div>
    <div class="history-panel" id="history-panel">
        <div class="history-header">
            <h3>🕰️ السجل</h3>
            <button class="ctrl-btn" onclick="toggleHistory()">✕</button>
        </div>
        <div id="history-list" class="history-list"></div>
    </div>

    <div class="header">
        <button class="ctrl-btn" onclick="toggleHistory()" title="سجل المحادثات">☰</button>
        <h1>🤖 POCKET AGENT</h1>
        <div class="header-actions">
            <button class="ctrl-btn" onclick="clearChat()" title="محادثة جديدة">🔄</button>
            <div class="agent-controls">
                <div class="status-dot" id="agent-status"></div>
                <button class="ctrl-btn" onclick="toggleAgent('start')" title="تشغيل">▶️</button>
                <button class="ctrl-btn" onclick="toggleAgent('stop')" title="إيقاف">⏹️</button>
            </div>
        </div>
    </div>

    <div class="chat-container" id="chat-box">
        <div class="empty-state" id="empty-state">
            <div class="icon">💬</div>
            <h3>ابدأ محادثة جديدة</h3>
            <p>اكتب رسالتك أو أرفق ملفاً، ووكيلك جاهز للمساعدة.</p>
        </div>
        <div class="typing" id="typing-indicator">
            <span>الوكيل يفكر</span>
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
    </div>

    <button class="scroll-bottom-btn" id="scroll-bottom-btn" onclick="scrollToBottom(true)">↓</button>
    <div class="toast" id="toast"></div>

    <div class="input-area">
        <button class="attach-btn" onclick="attachFile()" title="إرفاق ملف">📎</button>
        <textarea id="user-input" rows="1" placeholder="اكتب رسالة..." onkeydown="handleKeyDown(event)" oninput="autoGrow(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="إرسال">➤</button>
    </div>

    <script>
        marked.setOptions({ highlight: function(code) { return hljs.highlightAuto(code).value; }, breaks: true });

        let currentFilePath = null;
        let isGenerating = false;
        let lastUserPrompt = null;
        let lastFilePath = null;
        let msgCounter = 0;
        let activeStream = null; // الرسالة الحية قيد البث حالياً
        const messageStore = {}; // نص كل رسالة (أصلي + مترجم) لأزرار شريط الأدوات

        // ==========================================
        // أدوات عامة للواجهة
        // ==========================================
        function showToast(text) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.classList.add('visible');
            clearTimeout(t._hideTimer);
            t._hideTimer = setTimeout(() => t.classList.remove('visible'), 1800);
        }

        function autoGrow(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function isNearBottom() {
            const box = document.getElementById('chat-box');
            return box.scrollHeight - box.scrollTop - box.clientHeight < 80;
        }

        function scrollToBottom(force) {
            const box = document.getElementById('chat-box');
            if (force || isNearBottom()) box.scrollTop = box.scrollHeight;
            document.getElementById('scroll-bottom-btn').classList.remove('visible');
        }

        function updateEmptyState() {
            const box = document.getElementById('chat-box');
            const hasMessages = box.querySelectorAll('.message').length > 0;
            const empty = document.getElementById('empty-state');
            if (empty) empty.style.display = hasMessages ? 'none' : 'flex';
        }

        function clearChat() {
            document.getElementById('chat-box').innerHTML =
                '<div class="empty-state" id="empty-state"><div class="icon">💬</div><h3>ابدأ محادثة جديدة</h3><p>اكتب رسالتك أو أرفق ملفاً، ووكيلك جاهز للمساعدة.</p></div>' +
                '<div class="typing" id="typing-indicator"><span>الوكيل يفكر</span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
            activeStream = null;
        }

        function toggleAgent(action) {
            let cmd = action === 'start'
                ? 'nohup /data/data/com.termux/files/usr/bin/python3 /data/data/com.termux/files/home/agent_project/agent.py > /dev/null 2>&1 &'
                : 'pkill -f agent.py';
            if (window.TermuxBridge) TermuxBridge.runCommand(cmd, "handleAgentToggle");
        }
        function handleAgentToggle() { document.getElementById('agent-status').classList.toggle('online'); }

        // ==========================================
        // إرسال / استقبال الرسائل
        // ==========================================
        function setGenerating(state) {
            isGenerating = state;
            document.getElementById('send-btn').disabled = state;
            document.getElementById('typing-indicator').classList.toggle('visible', state);
        }

        function sendMessage() {
            if (isGenerating) return;
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text && !currentFilePath) return;

            let finalPrompt = text;
            if (currentFilePath) {
                finalPrompt = `File: ${currentFilePath}\nPrompt: ${text}`;
            }

            appendMessage('user', text || '(ملف مرفق)');
            lastUserPrompt = finalPrompt;
            lastFilePath = currentFilePath;
            input.value = '';
            input.style.height = 'auto';
            currentFilePath = null;
            renderAttachmentChip();

            startAgentStream(finalPrompt, lastFilePath);
        }

        function regenerateLast() {
            if (isGenerating || lastUserPrompt === null) return;
            startAgentStream(lastUserPrompt, lastFilePath);
        }

        function startAgentStream(prompt, filePath) {
            activeStream = null;
            setGenerating(true);
            const statusSpan = document.querySelector('#typing-indicator span');
            if (statusSpan) statusSpan.textContent = 'الوكيل يفكر';
            if (window.TermuxBridge) {
                TermuxBridge.sendAgentMessageStream(prompt, "n", filePath || "", "handleAIStreamLine");
            }
        }

        // ==========================================
        // معالجة البث اللحظي لرد الوكيل
        // ==========================================
        function ensureActiveStreamMessage() {
            if (activeStream) return activeStream;
            const chatBox = document.getElementById('chat-box');
            const id = 'msg-' + (++msgCounter);
            messageStore[id] = { original: '', translated: null, showingTranslated: false };

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ai';
            msgDiv.id = id;

            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            meta.textContent = 'الوكيل';
            msgDiv.appendChild(meta);

            const details = buildThinkingSection();
            msgDiv.appendChild(details);

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            msgDiv.appendChild(bubble);

            chatBox.insertBefore(msgDiv, document.getElementById('typing-indicator'));
            updateEmptyState();

            activeStream = { id: id, msgDiv: msgDiv, details: details, bubble: bubble, gotFinal: false, typingDone: false };
            return activeStream;
        }

        function stripAnsi(str) {
            return str.replace(/\x1b\[[0-9;]*m/g, '').replace(/\u001b\[[0-9;]*m/g, '');
        }

        function handleAIStreamLine(line) {
            if (line === "__EXECUTION_DONE__") {
                setGenerating(false);
                if (activeStream && !activeStream.gotFinal) {
                    activeStream.bubble.textContent = 'تعذر توليد الرد. حاول مجدداً.';
                    activeStream.msgDiv.appendChild(buildToolbar(activeStream.id));
                    scrollToBottom(true);
                    activeStream = null;
                }
                return;
            }

            if (line.startsWith("__STATUS_THINKING__")) {
                const s = document.querySelector('#typing-indicator span');
                if (s) s.textContent = 'الوكيل يحلل الطلب';
                return;
            }
            if (line.startsWith("__STATUS_GENERATING__")) {
                const s = document.querySelector('#typing-indicator span');
                if (s) s.textContent = 'الوكيل يكتب الرد';
                return;
            }
            if (line.startsWith("__FINAL_RESPONSE__|||")) {
                const stream = ensureActiveStreamMessage();
                const content = line.substring("__FINAL_RESPONSE__|||".length);
                messageStore[stream.id].original = content;
                stream.gotFinal = true;
                scrollToBottom(false);
                typewriterReveal(stream, content);
                return;
            }
            if (line.startsWith("__TRANSLATION__|||")) {
                if (activeStream) {
                    messageStore[activeStream.id].translated = line.substring("__TRANSLATION__|||".length);
                }
                return;
            }
            if (line.startsWith("__STREAM_ERROR__|||")) {
                const stream = ensureActiveStreamMessage();
                stream.bubble.innerHTML = '<span style="color:var(--danger)">⚠️ ' + line.substring("__STREAM_ERROR__|||".length) + '</span>';
                stream.gotFinal = true;
                stream.msgDiv.appendChild(buildToolbar(stream.id));
                return;
            }

            // أي سطر آخر = خطوة فعلية من trace_step (شجرة ملوّنة بألوان ANSI)
            const clean = stripAnsi(line).trim();
            if (!clean) return;
            const stream = ensureActiveStreamMessage();
            addThinkingStep(stream.details, clean);
        }

        // ==========================================
        // تأثير آلة الطباعة على الرد النهائي
        // ==========================================
        function typewriterReveal(stream, fullText) {
            stream.bubble.innerHTML = '';
            const cursor = document.createElement('span');
            cursor.className = 'typing-cursor';
            stream.bubble.appendChild(cursor);

            const myTypingToken = Symbol();
            stream._typingToken = myTypingToken;

            let i = 0;
            const chunkSize = 3;
            const speed = 10;

            function finishTyping() {
                if (stream._typingToken !== myTypingToken) return; // بدأ ردّ جديد بالمنتصف
                cursor.remove();
                renderAiBubble(stream.bubble, fullText);
                stream.msgDiv.appendChild(buildToolbar(stream.id));
                scrollToBottom(false);
                activeStream = null;
            }

            function step() {
                if (stream._typingToken !== myTypingToken) return;
                if (i >= fullText.length) { finishTyping(); return; }
                const nextChunk = fullText.substring(i, i + chunkSize);
                i += chunkSize;
                stream.bubble.insertBefore(document.createTextNode(nextChunk), cursor);
                if (isNearBottom()) scrollToBottom(true);
                setTimeout(step, speed);
            }

            // الضغط على الفقاعة أثناء الطباعة يُنهي التأثير فوراً ويعرض النص كاملاً
            stream.bubble.onclick = function () {
                i = fullText.length;
            };

            step();
        }

        // ==========================================
        // بناء وعرض الرسائل (تُستخدم لرسائل المستخدم وتحميل السجل القديم)
        // ==========================================
        function appendMessage(sender, content) {
            const chatBox = document.getElementById('chat-box');
            const id = 'msg-' + (++msgCounter);
            messageStore[id] = { original: content, translated: null, showingTranslated: false };

            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.id = id;

            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            meta.textContent = sender === 'user' ? 'أنت' : (sender === 'ai' ? 'الوكيل' : '');
            if (sender !== 'system') msgDiv.appendChild(meta);

            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            if (sender === 'ai') {
                renderAiBubble(bubble, content);
                msgDiv.appendChild(bubble);
                msgDiv.appendChild(buildToolbar(id));
            } else if (sender === 'system') {
                msgDiv.textContent = content;
            } else {
                bubble.textContent = content;
                msgDiv.appendChild(bubble);
            }

            chatBox.insertBefore(msgDiv, document.getElementById('typing-indicator'));
            updateEmptyState();
            scrollToBottom(sender === 'user');
        }

        function renderAiBubble(bubble, content) {
            let rawHtml = marked.parse(content);
            let cleanHtml = DOMPurify.sanitize(rawHtml, {
                FORBID_TAGS: ['iframe', 'script', 'object', 'embed', 'form'],
                FORBID_ATTR: ['onerror', 'onload', 'onclick']
            });
            cleanHtml = cleanHtml.replace(/<a href="(.*?)"/g, '<a href="#" onclick="openInAppBrowser(\'$1\')"');
            bubble.innerHTML = cleanHtml;
            bubble.onclick = null;
            bubble.querySelectorAll('pre code').forEach((block) => {
                const header = document.createElement('div');
                header.classList.add('code-header');
                const lang = (block.className.match(/language-(\w+)/) || [])[1] || 'code';
                header.innerHTML = '<span>' + lang + '</span><div class="code-actions"><button onclick="copyCode(this)">نسخ</button>' +
                    (lang === 'html' ? '<button onclick="previewHtml(this)">معاينة</button>' : '') + '</div>';
                block.parentNode.parentNode.insertBefore(header, block.parentNode);
                block.parentNode.parentNode.classList.add('code-block-wrapper');
            });
        }

        function buildToolbar(id) {
            const bar = document.createElement('div');
            bar.className = 'msg-toolbar';
            bar.innerHTML =
                '<button title="نسخ" onclick="copyMessage(\'' + id + '\', this)">' + ICONS.copy + '</button>' +
                '<button title="ترجمة" onclick="translateMessage(\'' + id + '\', this)">' + ICONS.translate + '</button>' +
                '<button title="مشاركة" onclick="shareMessage(\'' + id + '\')">' + ICONS.share + '</button>' +
                '<button title="قراءة صوتية" onclick="playMessage(\'' + id + '\', this)">' + ICONS.play + '</button>' +
                '<span class="spacer"></span>' +
                '<button title="إعجاب" onclick="rateMessage(\'' + id + '\', this, true)">' + ICONS.like + '</button>' +
                '<button title="عدم إعجاب" onclick="rateMessage(\'' + id + '\', this, false)">' + ICONS.dislike + '</button>' +
                '<button title="إعادة توليد" onclick="regenerateLast()">' + ICONS.retry + '</button>';
            return bar;
        }

        const ICONS = {
            copy: '<svg viewBox="0 0 24 24"><rect x="7" y="7" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',
            translate: '<svg viewBox="0 0 24 24"><path d="M3 5h9M7 3v2M9.5 5c0 4-2.5 7-6 8.5M6 9c1 2.5 3 4 5 5"/><path d="M13 21l4-9 4 9M14.5 18h5"/></svg>',
            share: '<svg viewBox="0 0 24 24"><path d="M4 12v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6"/><path d="M8 8l4-5 4 5M12 3v13"/></svg>',
            play: '<svg viewBox="0 0 24 24"><path d="M6 4l14 8-14 8V4z"/></svg>',
            pause: '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>',
            like: '<svg viewBox="0 0 24 24"><path d="M7 10v11H4a1 1 0 0 1-1-1v-9a1 1 0 0 1 1-1h3zm0 0l4.5-8a2 2 0 0 1 3.6 1.2L14 9h5a2 2 0 0 1 2 2.4l-1.6 8A2 2 0 0 1 17.4 21H10a3 3 0 0 1-3-3"/></svg>',
            dislike: '<svg viewBox="0 0 24 24"><path d="M17 14V3h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1h-3zm0 0l-4.5 8a2 2 0 0 1-3.6-1.2L10 15H5a2 2 0 0 1-2-2.4l1.6-8A2 2 0 0 1 6.6 3H14a3 3 0 0 1 3 3"/></svg>',
            retry: '<svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 1 1 2.3 5.6M4 21v-5h5"/></svg>'
        };

        // ==========================================
        // أفعال شريط الأدوات
        // ==========================================
        function copyMessage(id, btn) {
            const data = messageStore[id];
            const text = data.showingTranslated && data.translated ? data.translated : data.original;
            navigator.clipboard.writeText(text).then(() => {
                showToast('تم النسخ');
                btn.classList.add('copied');
                setTimeout(() => btn.classList.remove('copied'), 1500);
            });
        }

        function shareMessage(id) {
            const data = messageStore[id];
            const text = data.showingTranslated && data.translated ? data.translated : data.original;
            if (navigator.share) {
                navigator.share({ text: text }).catch(() => {});
            } else {
                navigator.clipboard.writeText(text);
                showToast('تم النسخ (المشاركة غير مدعومة هنا)');
            }
        }

        let currentAudioMsgId = null;
        function playMessage(id, btn) {
            if (!('speechSynthesis' in window)) { showToast('القراءة الصوتية غير مدعومة'); return; }
            const data = messageStore[id];
            const text = (data.showingTranslated && data.translated ? data.translated : data.original)
                .replace(/```[\s\S]*?```/g, ' كود برمجي ');

            if (currentAudioMsgId === id && speechSynthesis.speaking) {
                speechSynthesis.cancel();
                currentAudioMsgId = null;
                btn.innerHTML = ICONS.play;
                return;
            }
            speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = data.showingTranslated ? 'en-US' : 'ar-SA';
            utter.onend = function () { btn.innerHTML = ICONS.play; currentAudioMsgId = null; };
            currentAudioMsgId = id;
            btn.innerHTML = ICONS.pause;
            speechSynthesis.speak(utter);
        }

        function rateMessage(id, btn, positive) {
            const bar = btn.closest('.msg-toolbar');
            bar.querySelectorAll('.active-like, .active-dislike').forEach((b) => {
                b.classList.remove('active-like', 'active-dislike');
            });
            btn.classList.add(positive ? 'active-like' : 'active-dislike');
            if (window.TermuxBridge) {
                TermuxBridge.savePreference('feedback_' + id, positive ? 'up' : 'down');
            }
            showToast(positive ? 'شكراً لتقييمك 👍' : 'تم إرسال ملاحظتك 👎');
        }

        function translateMessage(id, btn) {
            const data = messageStore[id];
            if (data.showingTranslated) {
                data.showingTranslated = false;
                refreshBubble(id);
                btn.classList.remove('active-translate');
                return;
            }
            if (data.translated) {
                data.showingTranslated = true;
                refreshBubble(id);
                btn.classList.add('active-translate');
                return;
            }
            btn.disabled = true;
            const cbName = '__translate_cb_' + id;
            window[cbName] = function (result) {
                data.translated = result;
                data.showingTranslated = true;
                refreshBubble(id);
                btn.disabled = false;
                btn.classList.add('active-translate');
                delete window[cbName];
            };
            if (window.TermuxBridge) {
                TermuxBridge.translateText(data.original, 'ar', cbName);
            }
        }

        function refreshBubble(id) {
            const msgDiv = document.getElementById(id);
            const bubble = msgDiv.querySelector('.bubble');
            const data = messageStore[id];
            renderAiBubble(bubble, data.showingTranslated && data.translated ? data.translated : data.original);
        }

        // ==========================================
        // قسم "عرض التفاصيل" (خطوات trace_step قبل الرد النهائي)
        // ==========================================
        function buildThinkingSection() {
            const details = document.createElement('details');
            details.className = 'thinking-details';
            details.hidden = true;
            details.innerHTML = '<summary>عرض تفاصيل التفكير</summary><div class="steps-body"></div>';
            return details;
        }

        function addThinkingStep(details, stepText) {
            details.hidden = false;
            const body = details.querySelector('.steps-body');
            const line = document.createElement('div');
            line.className = 'step-line';
            line.textContent = stepText;
            body.appendChild(line);
            body.scrollTop = body.scrollHeight;
        }

        // ==========================================
        // روابط ومرفقات
        // ==========================================
        function openInAppBrowser(url) { if (window.TermuxBridge) TermuxBridge.openBrowser(url); }
        function copyCode(btn) {
            navigator.clipboard.writeText(btn.closest('.code-block-wrapper').querySelector('code').innerText);
            btn.textContent = 'تم!'; setTimeout(() => btn.textContent = 'نسخ', 1500);
        }
        function previewHtml(btn) {
            const blob = new Blob([btn.closest('.code-block-wrapper').querySelector('code').innerText], { type: 'text/html' });
            if (window.TermuxBridge) TermuxBridge.openBrowser(URL.createObjectURL(blob));
        }
        function attachFile() { if (window.TermuxBridge) TermuxBridge.pickFile("onFileSelected"); }
        function onFileSelected(filePath) { currentFilePath = filePath; renderAttachmentChip(); }
        function renderAttachmentChip() {
            const placeholder = currentFilePath ? ('📎 ' + currentFilePath.split('/').pop() + ' مرفق') : 'اكتب رسالة...';
            document.getElementById('user-input').placeholder = placeholder;
        }
        function handleKeyDown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

        // ==========================================
        // السجل
        // ==========================================
        function toggleHistory() {
            const panel = document.getElementById('history-panel');
            const overlay = document.getElementById('overlay');
            const isOpen = panel.classList.contains('open');
            if (isOpen) { panel.classList.remove('open'); overlay.classList.remove('visible'); }
            else { panel.classList.add('open'); overlay.classList.add('visible'); fetchHistory(); }
        }
        function fetchHistory() {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '<div class="history-item">جاري التحميل...</div>';
            if (window.TermuxBridge) TermuxBridge.getChatHistory("handleHistoryList");
        }
        function handleHistoryList(result) {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';
            try {
                const history = JSON.parse(result);
                if (history.error) { historyList.innerHTML = '<div class="history-item">خطأ: ' + history.error + '</div>'; return; }
                if (history.length === 0) { historyList.innerHTML = '<div class="history-item">لا يوجد سجل</div>'; return; }
                history.forEach((chat) => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerHTML = '<div class="title">💬 ' + chat.preview + '</div><div class="date">' + chat.start_time + '</div>';
                    item.onclick = () => loadChat(chat.id);
                    historyList.appendChild(item);
                });
            } catch (e) { historyList.innerHTML = '<div class="history-item">فشل التحميل</div>'; }
        }
        function loadChat(chatId) {
            toggleHistory();
            clearChat();
            if (window.TermuxBridge) TermuxBridge.getChatById(String(chatId), "handleLoadChat");
        }
        function handleLoadChat(result) {
            try {
                const messages = JSON.parse(result);
                messages.forEach((msg) => appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content));
            } catch (e) {}
        }

        document.getElementById('chat-box').addEventListener('scroll', () => {
            const btn = document.getElementById('scroll-bottom-btn');
            if (!isNearBottom()) btn.classList.add('visible'); else btn.classList.remove('visible');
        });

        updateEmptyState();
    </script>
</body>
</html>
